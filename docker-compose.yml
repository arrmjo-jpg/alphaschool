# AlphaSchool ERP -- Docker development environment
# (docs/developer/docker-development.md)
#
# Every service talks to every other service by name on the
# `alphaschool` network below -- never 127.0.0.1/localhost. The two
# legitimate exceptions are APP_URL/CORS_ALLOWED_ORIGINS/VITE_API_URL,
# which describe what the developer's own browser (running outside
# Docker entirely) sees via each service's published port.
#
# Credentials below are dev-only, throwaway, and intentionally
# committed -- this file never runs anywhere but a developer's own
# machine. They must stay in sync with the matching values in
# .env.docker.

name: alphaschool

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - alphaschool

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-app.ini:ro
    env_file:
      - .env.docker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - alphaschool

  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-app.ini:ro
    env_file:
      - .env.docker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - alphaschool

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /var/www/html
    command: php artisan schedule:work
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/99-app.ini:ro
    env_file:
      - .env.docker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - alphaschool

  vite:
    build:
      context: .
      dockerfile: admin/Dockerfile
    working_dir: /workspace
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
      # admin/node_modules is masked too, defensively -- npm workspaces
      # hoist to the root node_modules above, but if a developer ever
      # ran `npm install` natively on the host first (Windows-native
      # binaries), an unmaked nested admin/node_modules would shadow the
      # container's Linux-native one straight through the bind mount.
      - admin_node_modules:/workspace/admin/node_modules
    ports:
      - "5173:5173"
    networks:
      - alphaschool

  mysql:
    image: mariadb:11.4
    environment:
      MARIADB_ROOT_PASSWORD: secret
      MARIADB_DATABASE: alphaschool
      MARIADB_USER: alphaschool
      MARIADB_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - alphaschool

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - alphaschool

  meilisearch:
    image: getmeili/meilisearch:v1.11
    environment:
      MEILI_MASTER_KEY: masterKey
      MEILI_NO_ANALYTICS: "true"
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - alphaschool

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
    networks:
      - alphaschool

networks:
  alphaschool:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  meilisearch_data:
  backend_vendor:
  node_modules:
  admin_node_modules:
