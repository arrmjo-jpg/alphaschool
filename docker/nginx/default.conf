# Development vhost, bind-mounted into the nginx container (see
# docker-compose.yml). Fronts the `app` (php-fpm) container by service
# name over the Docker network -- never 127.0.0.1/localhost.

server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 64M;

    # Docker's embedded DNS (127.0.0.11), with a short TTL and the
    # upstream referenced through a variable rather than a static
    # `fastcgi_pass app:9000` literal -- a static reference resolves once
    # at config load and never again, so any time the `app` container is
    # recreated (a rebuild, a restart -- an entirely normal event in
    # development) it gets a new IP and nginx keeps silently 502ing
    # against the stale one until nginx itself is restarted. A variable
    # forces re-resolution on every request instead.
    resolver 127.0.0.11 valid=10s;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        set $upstream_app app:9000;
        fastcgi_pass $upstream_app;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
