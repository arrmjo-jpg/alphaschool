; Development overrides, bind-mounted into the app/queue/scheduler
; containers (see docker-compose.yml). Not tuned for production.

memory_limit = 512M
upload_max_filesize = 64M
post_max_size = 64M
max_execution_time = 120

display_errors = On
error_reporting = E_ALL

; validate_timestamps=1 + revalidate_freq=0 means opcache checks every
; file's mtime on every request and recompiles instantly on change --
; slower than a tuned production setting, but edits show up immediately
; without needing to restart the container, which is the whole point of
; a dev environment.
opcache.enable = 1
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
opcache.memory_consumption = 128
